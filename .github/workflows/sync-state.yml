name: Sync Bot State

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch state.json from VPS
        run: |
          SYNC_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if curl -sf --max-time 10 http://161.35.173.113:8080/state.json | jq --arg t "$SYNC_TIME" '. + {github_sync: $t}' > state.json; then
            echo "Fetched VPS state at $SYNC_TIME"
          else
            echo "VPS unreachable at $SYNC_TIME"
            jq --arg t "$SYNC_TIME" '. + {github_sync: $t, vps_reachable: false}' state.json > state.json.tmp && mv state.json.tmp state.json || true
          fi

      - name: Commit and push if changed
        run: |
          git config user.name  "scanner-bot"
          git config user.email "bot@scanner"
          git add state.json
          git diff --cached --quiet && echo "No changes" || git commit -m "sync state $(date -u +%H:%M)"
          git push
